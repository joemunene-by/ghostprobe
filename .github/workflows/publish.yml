name: Publish to PyPI

# Publishes to PyPI via Trusted Publishing (OIDC). No API token is stored:
# PyPI verifies the upload came from this repo's workflow. Fires when a
# GitHub release is published (cut one with `gh release create vX.Y.Z`).

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distributions
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
